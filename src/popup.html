<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <link rel="stylesheet" href="./css/bootstrap.min.css">
        <style>
            body { width: 400px; }
        </style>
    </head>
    <body class="p-3">

        <div class="d-flex justify-content-between align-items-center mb-3">
            <h5 class="m-0 fw-bold text-primary">LinkVault</h5>
            <!-- Pulsante per aprire dashboard -->
            <button id="btn-open-dashboard" class="btn btn-sm btn-outline-secondary" title="Apri Dashboard">
                Gestisci
            </button>
        </div>

        <form id="form-save-link">
            <!-- Titolo (riempito in automatico) -->
            <div class="mb-2">
                <label class="form-label small mb-1">Titolo</label>
                <input type="text" id="input-title" class="form-control form-control-sm" required>
            </div>

            <!-- URL (riempito in automatico) -->
            <div class="mb-2">
                <label class="form-label small mb-1">URL</label>
                <input type="url" id="input-url" class="form-control form-control-sm" readonly required>
            </div>

            <!-- Categoria -->
            <div class="mb-2">
                <label class="form-label small mb-1">Categoria</label>
                <input type="text" id="input-category" class="form-control form-control-sm" placeholder="Es. DevOps, Ricette..." required>
            </div>

            <!-- Author -->
            <div class="mb-2">
                <label class="form-label small mb-1">Author (separati da virgola)</label>
                <input type="text" id="input-author" class="form-control form-control-sm" placeholder="Es. Michael, Sara">
            </div>

            <!-- Tag -->
            <div class="mb-2">
                <label class="form-label small mb-1">Tag (separati da virgola)</label>
                <input type="text" id="input-tags" class="form-control form-control-sm" placeholder="Es. docker, tutorial">
            </div>

            <!-- Descrizione -->
            <div class="mb-3">
                <label class="form-label small mb-1">Descrizione</label>
                <textarea id="input-description" class="form-control form-control-sm" rows="2"></textarea>
            </div>

            <!-- Bottone di invio -->
            <button type="submit" class="btn btn-primary btn-sm w-100">Salva Link</button>
        </form>

        <script src="./js/popup.js"></script>
    </body>
</html>
