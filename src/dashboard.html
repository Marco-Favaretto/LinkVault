<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" href="./css/bootstrap.min.css">
        <link rel="stylesheet" href="./css/dashboard.css"> 
    </head>
    <body>
        <script src="./js/bootstrap.bundle.min.js"></script>
        <script src="./js/dashboard.js"></script>
        <div class="container-fluid py-4">
            <div class="row g-4">
                
                <aside class="col-md-3">
                    <div class="card p-3 mb-3 shadow-sm">
                        <h5 class="card-title mb-3">Filtri</h5>
                        
                        <div class="mb-4">
                            <h6 class="text-muted small text-uppercase">Categorie</h6>
                            <div id="filter-categories" class="list-group list-group-flush">
                            </div>
                        </div>

                        <div class="mb-2">
                            <h6 class="text-muted small text-uppercase">Autori</h6>
                            <div id="filter-authors" class="d-flex flex-wrap gap-1">
                            </div>
                        </div>

                        <div>
                            <h6 class="text-muted small text-uppercase">Tag</h6>
                            <div id="filter-tags" class="d-flex flex-wrap gap-1">
                            </div>
                        </div>
                    </div>

                    <div class="card p-3 shadow-sm">
                        <h5 class="card-title mb-3">Dati</h5>
                        <button id="btn-export" class="btn btn-outline-primary btn-sm w-100 mb-2">Esporta JSON</button>
                        <label for="input-import" class="btn btn-outline-secondary btn-sm w-100 m-0">Importa JSON</label>
                        <input type="file" id="input-import" accept=".json" class="d-none">

                        <button id="btn-clear-all" class="btn btn-sm btn-outline-danger mt-1">Svuota Database</button>
                    </div>
                </aside>

                <main class="col-md-9 d-flex flex-column h-100">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                            <h1 class="display-6 fw-bold text-body-emphasis d-flex align-items-center gap-3 mb-0">
                                LinkVault
                                <span class="badge rounded-pill bg-secondary-subtle text-secondary border">
                                    Dashboard
                                </span>
                            </h1>
                            
                            <button id="theme-toggle" class="btn btn-sm btn-outline-secondary d-flex align-items-center gap-2 shadow-sm fw-medium">
                                Join the dark side
                            </button>
                        </div>

                        <div class="mb-4">
                            <div class="input-group shadow-sm rounded">
                                <span class="input-group-text bg-body border-end-0 text-muted" id="search-addon">
                                    Search: 
                                </span>
                                <input type="search" 
                                    id="search-bar" 
                                    class="form-control form-control-lg border-start-0 ps-0" 
                                    placeholder="Cerca per titolo, URL, tag o descrizione..." 
                                    aria-label="Cerca" 
                                    aria-describedby="search-addon">
                            </div>
                        </div>

                    <!-- Tabella dei Link -->
                    <div class="table-responsive bg-body rounded shadow-sm flex-grow-1 table-scroll">
                        <table class="table table-hover align-middle mb-0">
                            <thead class="table-light">
                                <tr>
                                    <th scope="col" style="width: 30%;">Titolo / URL</th>
                                    <th scope="col" style="width: 30%;">Autori</th>
                                    <th scope="col" style="width: 15%;">Categoria</th>
                                    <th scope="col" style="width: 35%;">Descrizione / Tag</th>
                                    <th scope="col" scope="col" style="width: 10%;" class="text-end">Azioni</th>
                                </tr>
                            </thead>
                            <tbody id="links-container">
                                <!-- tr da dashboard.js -->
                            </tbody>
                        </table>
                    </div>
                </main>

            </div>
        </div>

        <!-- modale modifica link -->
        <div class="modal fade" id="editModal" tabindex="-1" aria-labelledby="editModalLabel" aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title" id="editModalLabel">Modifica Link</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <form id="form-edit-link">
                            <input type="hidden" id="edit-id">
                            <div class="mb-2">
                                <label class="form-label small mb-1">Titolo</label>
                                <input type="text" id="edit-title" class="form-control form-control-sm" required>
                            </div>
                            <div class="mb-2">
                                <label class="form-label small mb-1">URL</label>
                                <input type="url" id="edit-url" class="form-control form-control-sm" required>
                            </div>
                            <div class="mb-2">
                                <label class="form-label small mb-1">Categoria</label>
                                <input type="text" id="edit-category" class="form-control form-control-sm" required>
                            </div>
                            <div class="mb-2">
                                <label class="form-label small mb-1">Autori (separati da virgola)</label>
                                <input type="text" id="edit-auths" class="form-control form-control-sm">
                            </div>
                            <div class="mb-2">
                                <label class="form-label small mb-1">Tag (separati da virgola)</label>
                                <input type="text" id="edit-tags" class="form-control form-control-sm">
                            </div>
                            <div class="mb-3">
                                <label class="form-label small mb-1">Descrizione</label>
                                <textarea id="edit-description" class="form-control form-control-sm" rows="2"></textarea>
                            </div>
                            <div class="d-flex justify-content-end gap-2">
                                <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Annulla</button>
                                <button type="submit" class="btn btn-primary btn-sm">Salva modifiche</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>

    </body>
</html>
